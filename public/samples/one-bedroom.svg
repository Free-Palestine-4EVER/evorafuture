<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#f8fafc"/>
  <rect x="20" y="20" width="760" height="560" fill="#eef2f7"/>
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#374151" stroke-width="8"/>

  <!-- vertical partition splitting left (living/kitchen) from right (bedroom/bath) -->
  <line x1="460" y1="20" x2="460" y2="580" stroke="#374151" stroke-width="6"/>
  <!-- door from living to hall -->
  <line x1="460" y1="300" x2="460" y2="360" stroke="#eef2f7" stroke-width="8"/>
  <path d="M460 360 A60 60 0 0 0 520 300" fill="none" stroke="#9aa6b2" stroke-width="2"/>

  <!-- kitchen partition top-left -->
  <line x1="20" y1="200" x2="250" y2="200" stroke="#374151" stroke-width="6"/>
  <line x1="250" y1="20" x2="250" y2="200" stroke="#374151" stroke-width="6"/>
  <line x1="250" y1="90" x2="250" y2="140" stroke="#eef2f7" stroke-width="8"/>

  <!-- bathroom bottom-right -->
  <line x1="600" y1="400" x2="780" y2="400" stroke="#374151" stroke-width="6"/>
  <line x1="600" y1="400" x2="600" y2="580" stroke="#374151" stroke-width="6"/>
  <line x1="600" y1="450" x2="600" y2="500" stroke="#eef2f7" stroke-width="8"/>

  <!-- bedroom door -->
  <line x1="560" y1="20" x2="620" y2="20" stroke="#eef2f7" stroke-width="8"/>

  <text x="120" y="380" font-family="sans-serif" font-size="24" fill="#94a3b8">Living</text>
  <text x="90" y="120" font-family="sans-serif" font-size="18" fill="#94a3b8">Kitchen</text>
  <text x="540" y="200" font-family="sans-serif" font-size="24" fill="#94a3b8">Bedroom</text>
  <text x="640" y="500" font-family="sans-serif" font-size="18" fill="#94a3b8">Bath</text>
</svg>
