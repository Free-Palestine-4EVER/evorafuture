<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400">
  <rect width="500" height="400" fill="#f8fafc"/>
  <!-- floor -->
  <rect x="18" y="18" width="464" height="364" fill="#eef2f7"/>
  <!-- outer walls -->
  <rect x="18" y="18" width="464" height="364" fill="none" stroke="#374151" stroke-width="8"/>
  <!-- bathroom partition (top-right) -->
  <line x1="360" y1="18" x2="360" y2="170" stroke="#374151" stroke-width="6"/>
  <line x1="360" y1="170" x2="482" y2="170" stroke="#374151" stroke-width="6"/>
  <!-- bathroom door gap + swing -->
  <line x1="360" y1="95" x2="360" y2="135" stroke="#eef2f7" stroke-width="8"/>
  <path d="M360 135 A40 40 0 0 0 400 95" fill="none" stroke="#9aa6b2" stroke-width="2"/>
  <!-- entry door (bottom) -->
  <line x1="210" y1="382" x2="270" y2="382" stroke="#eef2f7" stroke-width="10"/>
  <path d="M210 382 A60 60 0 0 1 210 322" fill="none" stroke="#9aa6b2" stroke-width="2"/>
  <!-- labels -->
  <text x="170" y="260" font-family="sans-serif" font-size="22" fill="#94a3b8">Living / Sleeping</text>
  <text x="392" y="100" font-family="sans-serif" font-size="16" fill="#94a3b8">Bath</text>
  <text x="60" y="60" font-family="sans-serif" font-size="16" fill="#94a3b8">Kitchen</text>
</svg>
